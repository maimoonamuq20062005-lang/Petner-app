name: petnerapp
description: "PETNER - Premium Pet Matchmaking & Social Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Design
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  photo_view: ^0.15.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1

  # Swiping
  flutter_card_swiper: ^7.0.1

  # Navigation & State
  go_router: ^14.2.0
  provider: ^6.1.2

  # Storage & Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # Media
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Maps & Location
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  permission_handler: ^11.3.1
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
